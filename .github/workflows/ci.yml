name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check no files generated after install
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Files were generated or modified after bun install (prepare runs rulesync generate). Commit the regenerated files."
            git status --porcelain
            git diff
            exit 1
          fi

      - name: Run check
        run: bun run check

      - name: Run secretlint
        run: bun run secretlint

      - name: Run cspell
        run: bun run cspell

      - name: Run tests
        run: bun run test

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Build project
        run: bun run build

      - name: Check no uncommitted changes after build
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Uncommitted changes detected after build"
            git status --porcelain
            git diff
            exit 1
          fi

      - name: Check build artifacts
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/index.d.cts

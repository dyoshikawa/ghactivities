name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Verify release source
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

          package_version="$(jq -r .version package.json)"
          if [ "$RELEASE_TAG" != "v${package_version}" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $package_version"
            exit 1
          fi

          git fetch origin main --no-tags
          release_commit="$(git rev-parse 'HEAD^{commit}')"
          main_commit="$(git rev-parse 'origin/main^{commit}')"
          if ! git merge-base --is-ancestor "$release_commit" "$main_commit"; then
            echo "Release commit $release_commit is not in the current main history"
            exit 1
          fi

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: |
          pnpm run check
          pnpm run secretlint
          pnpm run cspell
          pnpm run test

      - name: Build project
        run: pnpm run build

      - name: Configure npm authentication
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: pnpm publish --no-git-checks

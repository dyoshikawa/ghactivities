name: Draft Release

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: "New version without v prefix (e.g. 1.0.0). If empty, determined automatically by semantic versioning rules."
        required: false
        type: string
        default: ""
      model:
        description: "Model abbreviation (codex, glm, kimi). If empty, defaults to glm."
        required: false
        type: string
        default: ""

jobs:
  draft-release:
    if: >-
      github.actor == 'dyoshikawa' ||
      github.actor == 'cm-dyoshikawa'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        uses: ./.github/actions/git-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Select model
        id: select-model
        uses: ./.github/actions/select-opencode-model
        with:
          input-text: ${{ inputs.model }}

      - name: Run OpenCode to draft release
        # Third-party action executes an AI agent with repo secrets; pin to a full SHA.
        uses: anomalyco/opencode/github@10c894bdeef3618f5666fb506ef7f9491bb964d8 # v1.17.13
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_NEW_VERSION: ${{ inputs.new_version }}
        with:
          model: ${{ steps.select-model.outputs.model }}
          use_github_token: "true"
          share: false
          prompt: |
            Run the `draft-release` skill. Use the value of the `$INPUT_NEW_VERSION` environment variable as the skill's argument (it may be empty, in which case the skill will determine the new version automatically).
